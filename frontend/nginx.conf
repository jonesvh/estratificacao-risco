server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets indefinitely (Vite hashes filenames)
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|webp|gif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache the SPA entrypoint
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    gzip             on;
    gzip_vary        on;
    gzip_min_length  1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
}
