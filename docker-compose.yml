services:

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: er_backend
    restart: unless-stopped
    environment:
      NODE_ENV:       ${NODE_ENV:-production}
      PORT:           4000
      JSON_DB_PATH:   /app/MEDPREV/db.json
      CORS_ORIGIN:    ${CORS_ORIGIN:-http://192.168.1.250:6001}
      LOG_LEVEL:      ${LOG_LEVEL:-info}
    volumes:
      - ./MEDPREV:/app/MEDPREV
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - er_internal
    # port 4000 NOT exposed externally — nginx is the sole entry point

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: er_frontend
    restart: unless-stopped
    networks:
      - er_internal
    # port 80 NOT exposed externally — nginx proxies to it

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: er_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "${HTTP_PORT:-6001}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - er_internal
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  er_internal:
    driver: bridge
