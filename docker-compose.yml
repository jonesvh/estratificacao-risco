services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: er_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-estratificacao}
      POSTGRES_USER:     ${POSTGRES_USER:-eruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eruser} -d ${POSTGRES_DB:-estratificacao}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - er_internal
    # postgres port NOT exposed externally — only accessible inside er_internal

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: er_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:      ${NODE_ENV:-production}
      PORT:          4000
      DATABASE_URL:  postgresql://${POSTGRES_USER:-eruser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-estratificacao}
      JWT_SECRET:    ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      ADMIN_EMAIL:   ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      CORS_ORIGIN:   ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL:     ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - er_internal
    # port 4000 NOT exposed externally — nginx is the sole entry point

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: er_frontend
    restart: unless-stopped
    networks:
      - er_internal
    # port 80 NOT exposed externally — nginx proxies to it

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: er_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - er_internal
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  er_internal:
    driver: bridge
